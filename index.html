<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClipMaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --accent: #a78bfa;
            --accent-bright: #c4b5fd;
            --surface: rgba(255, 255, 255, 0.04);
            --surface-hover: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.08);
            --border-accent: rgba(167, 139, 250, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #09090b;
            color: #fafafa;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient background */
        .ambient-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }
        .orb-1 { width: 600px; height: 600px; background: #7c3aed; top: -200px; left: -100px; }
        .orb-2 { width: 500px; height: 500px; background: #6d28d9; bottom: -150px; right: -100px; }
        .orb-3 { width: 300px; height: 300px; background: #8b5cf6; top: 40%; left: 50%; transform: translateX(-50%); }

        /* Noise overlay */
        .noise {
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1;
        }

        .main-content { position: relative; z-index: 2; }

        /* Glass card */
        .glass-card {
            background: var(--surface);
            border: 1px solid var(--border);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glass-card:hover {
            border-color: var(--border-accent);
            background: var(--surface-hover);
            box-shadow: 0 0 0 1px rgba(167, 139, 250, 0.1), 0 20px 60px -12px rgba(124, 58, 237, 0.12);
        }

        /* API Key input */
        #apiKey {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            color: #fafafa;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #apiKey::placeholder { color: rgba(255, 255, 255, 0.2); }
        #apiKey:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(167, 139, 250, 0.15), 0 0 20px rgba(167, 139, 250, 0.08);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Upload button */
        #uploadWidget {
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
        }
        #uploadWidget::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent 60%);
            pointer-events: none;
        }
        #uploadWidget:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px -8px rgba(124, 58, 237, 0.5), 0 0 0 1px rgba(167, 139, 250, 0.3);
        }
        #uploadWidget:active { transform: translateY(0); }

        /* Video player */
        #video {
            background: #000;
            border-radius: 16px;
            width: 100%;
            max-height: 480px;
            object-fit: contain;
        }
        .video-wrapper {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.4);
        }
        .video-wrapper::before {
            content: '';
            position: absolute; inset: -1px;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(160deg, rgba(167,139,250,0.2), transparent 40%, transparent 60%, rgba(124,58,237,0.15));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 2;
        }

        /* Status text */
        #status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            min-height: 1.5rem;
        }
        .status-dot {
            display: inline-block;
            width: 6px; height: 6px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
        }
        .status-dot.idle { background: rgba(255,255,255,0.2); }
        .status-dot.working { background: #a78bfa; animation: pulse-dot 1.5s ease-in-out infinite; }
        .status-dot.done { background: #4ade80; }
        .status-dot.error { background: #f87171; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(167,139,250,0.4); }
            50% { opacity: 0.6; box-shadow: 0 0 0 6px rgba(167,139,250,0); }
        }

        /* Empty video state */
        .video-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            gap: 16px;
            color: rgba(255,255,255,0.15);
        }
        .video-placeholder.hidden { display: none; }

        /* Step indicators */
        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 0.875rem;
            color: rgba(255,255,255,0.3);
            transition: all 0.4s ease;
        }
        .step.active { color: var(--accent-bright); background: rgba(167,139,250,0.06); }
        .step.done { color: #4ade80; }
        .step-number {
            width: 28px; height: 28px;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.1);
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
            transition: all 0.4s ease;
        }
        .step.active .step-number { border-color: var(--accent); background: rgba(167,139,250,0.12); color: var(--accent-bright); }
        .step.done .step-number { border-color: #4ade80; background: rgba(74,222,128,0.1); color: #4ade80; }

        /* Spinner */
        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(167,139,250,0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.6875rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(167,139,250,0.08);
            color: var(--accent-bright);
            border: 1px solid rgba(167,139,250,0.12);
        }

        /* Footer link */
        .footer-link {
            color: rgba(255,255,255,0.25);
            text-decoration: none;
            transition: color 0.3s;
            font-size: 0.8125rem;
        }
        .footer-link:hover { color: var(--accent-bright); }
    </style>
</head>

<body>

    <!-- Ambient background -->
    <div class="ambient-orb orb-1"></div>
    <div class="ambient-orb orb-2"></div>
    <div class="ambient-orb orb-3"></div>
    <div class="noise"></div>

    <!-- Main content -->
    <div class="main-content min-h-screen flex flex-col">

        <!-- Navbar -->
        <nav class="w-full px-6 py-5 flex items-center justify-between" style="backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);">
            <div class="flex items-center gap-3 opacity-0" id="nav-logo">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-500 to-purple-700 flex items-center justify-center">
                    <i data-lucide="scissors" class="w-4 h-4 text-white"></i>
                </div>
                <span class="font-semibold text-sm tracking-tight">ClipMaker</span>
            </div>
            <div class="opacity-0" id="nav-badge">
                <span class="badge"><i data-lucide="sparkles" class="w-3 h-3"></i> AI-Powered</span>
            </div>
        </nav>

        <!-- Hero / App area -->
        <main class="flex-1 w-full max-w-3xl mx-auto px-6 py-16 sm:py-24 flex flex-col gap-16">

            <!-- Header -->
            <header class="flex flex-col items-center text-center gap-5 opacity-0" id="hero-header">
                <h1 class="text-4xl sm:text-5xl font-bold tracking-tight leading-tight bg-gradient-to-b from-white via-white to-zinc-500 bg-clip-text text-transparent">
                    ClipMaker
                </h1>
                <p class="text-base sm:text-lg text-zinc-400 max-w-md leading-relaxed font-light">
                    Encontre o momento viral do seu vídeo.<br class="hidden sm:block"> Upload, análise com IA e pronto.
                </p>
            </header>

            <!-- Input + Button row -->
            <section class="flex flex-col sm:flex-row gap-3 w-full opacity-0" id="action-row">
                <div class="relative flex-1">
                    <i data-lucide="key-round" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-zinc-600 pointer-events-none"></i>
                    <input
                        id="apiKey"
                        type="password"
                        placeholder="Chave de API do Gemini"
                        class="w-full pl-11 pr-4 py-3.5 rounded-xl text-sm"
                        autocomplete="off"
                        spellcheck="false"
                    >
                </div>
                <button
                    id="uploadWidget"
                    class="flex items-center justify-center gap-2.5 px-7 py-3.5 rounded-xl text-sm font-semibold text-white tracking-wide whitespace-nowrap"
                >
                    <i data-lucide="upload" class="w-4 h-4"></i>
                    Upload vídeo
                </button>
            </section>

            <!-- Steps tracker -->
            <section class="glass-card rounded-2xl p-5 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-0 sm:justify-between opacity-0" id="steps-tracker">
                <div class="step" id="step-1">
                    <span class="step-number">1</span>
                    <span>Upload</span>
                </div>
                <div class="hidden sm:block w-8 h-px bg-zinc-800"></div>
                <div class="step" id="step-2">
                    <span class="step-number">2</span>
                    <span>Transcrição</span>
                </div>
                <div class="hidden sm:block w-8 h-px bg-zinc-800"></div>
                <div class="step" id="step-3">
                    <span class="step-number">3</span>
                    <span>Análise IA</span>
                </div>
                <div class="hidden sm:block w-8 h-px bg-zinc-800"></div>
                <div class="step" id="step-4">
                    <span class="step-number">4</span>
                    <span>Clip pronto</span>
                </div>
            </section>

            <!-- Video area -->
            <section class="opacity-0" id="video-section">
                <div class="video-wrapper">
                    <div class="video-placeholder" id="videoPlaceholder">
                        <i data-lucide="film" class="w-12 h-12"></i>
                        <span class="text-sm font-light">Seu clip viral aparecerá aqui</span>
                    </div>
                    <video id="video" src="" controls class="hidden w-full"></video>
                </div>
            </section>

            <!-- Status -->
            <div class="flex items-center justify-center opacity-0" id="status-wrapper">
                <p id="status" class="text-zinc-500 text-center">
                    <span class="status-dot idle"></span>Aguardando upload...
                </p>
            </div>

        </main>

        <!-- Footer -->
        <footer class="w-full px-6 py-6 flex items-center justify-center gap-6 opacity-0" id="footer" style="border-top: 1px solid var(--border);">
            <span class="text-xs text-zinc-600 font-light">Feito com Cloudinary + Gemini AI</span>
        </footer>

    </div>

    <!-- Cloudinary widget -->
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>

    <script type="text/javascript">

        // Init Lucide icons
        lucide.createIcons();

        // ─── DOM refs ─────────────────────────────────
        const el = {
            status: document.getElementById('status'),
            video: document.getElementById('video'),
            apiKey: document.getElementById('apiKey'),
            button: document.getElementById('uploadWidget'),
            placeholder: document.getElementById('videoPlaceholder')
        }

        // ─── Status helpers ───────────────────────────
        function setStatus(text, state = 'idle') {
            el.status.innerHTML = `<span class="status-dot ${state}"></span>${text}`;
        }

        function setStep(stepNum, state) {
            const step = document.getElementById(`step-${stepNum}`);
            if (!step) return;
            step.classList.remove('active', 'done');
            if (state) step.classList.add(state);
        }

        // ─── App logic ───────────────────────────────
        const app = {
            transcriptionUrl: '',
            public_id: '',

            waitForTranscription: async () => {
                const maxAttempts = 30;
                const delay = 2000;

                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    const url = `https://res.cloudinary.com/${config.cloudName}/raw/upload/v${Date.now()}/${app.public_id}.transcript`;

                    try {
                        console.log(`Tentativa ${attempt}/${maxAttempts}: Verificando transcrição...`);
                        setStatus(`Buscando transcrição (${attempt}/${maxAttempts})...`, 'working');
                        const response = await fetch(url);

                        if (response.ok) {
                            app.transcriptionURL = url;
                            console.log('Transcrição encontrada!', url);
                            return true;
                        }
                    } catch (error) {
                        console.log(`Tentativa ${attempt} falhou:`, error.message);
                    }

                    if (attempt < maxAttempts) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }

                console.log('Transcrição não encontrada após todas as tentativas.');
                return false;
            },

            getTranscription: async () => {
                const response = await fetch(app.transcriptionURL);
                return response.text();
            },

            getViralMoment: async () => {
                const transcription = await app.getTranscription();
                const model = 'gemini-2.5-flash';
                const endpointGemini = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;

                const prompt = ` Role: You are a professional video editor specializing in viral content.

                Task: Analyze the transcription below and identify the most engaging, funny, or surprising segment.

                Constraints:
                1. Duration: Minimum 30 seconds, Maximum 60 seconds.
                2. Format: Return ONLY the start and end string for Cloudinary. Format: so_<start_seconds>,eo_<end_seconds>
                3. Examples: "so_10,eo_20" or "so_12.5,eo_45.2"
                4. CRITICAL: Do not use markdown, do not use quotes, do not explain. Return ONLY the raw string.

                Transcription:
                ${transcription}`;

                const headers = {
                    'x-goog-api-key': el.apiKey.value,
                    'Content-Type': 'application/json'
                }

                const contents = [{ parts: [{ text: prompt }] }];

                const maxAttempts = 3;
                const delay = 1500;

                for (let attempt = 1; attempt <= maxAttempts; attempt++) {
                    try {
                        const response = await fetch(endpointGemini, {
                            method: 'POST',
                            headers,
                            body: JSON.stringify({ contents })
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }

                        const data = await response.json();
                        const rawText = data.candidates[0].content.parts[0].text.trim();
                        return rawText.replace(/´´´/g, '').replace(/json/g, "").trim();

                    } catch (error) {
                        const isLastAttempt = attempt === maxAttempts;
                        console.log(`Gemini falhou (tentativa ${attempt}/${maxAttempts}):`, error.message);
                        if (isLastAttempt) throw error;
                        await new Promise(resolve => setTimeout(resolve, delay));
                    }
                }
            }
        }

        // ─── Cloudinary config ────────────────────────
        const config = {
            cloudName: 'de61oameh',
            uploadPreset: 'upload_nlw'
        }

        const myWidget = cloudinary.createUploadWidget(
            config, async (error, result) => {
                if (!error && result && result.event === "success") {
                    console.log('Done, here is the image info: ', result.info);
                    app.public_id = result.info.public_id;
                    setStep(1, 'done');

                    try {
                        // Step 2: Transcription
                        setStep(2, 'active');
                        setStatus('Processando transcrição do áudio...', 'working');
                        const isReady = await app.waitForTranscription();
                        if (!isReady) {
                            throw new Error('erro ao buscar transcrição');
                        }
                        setStep(2, 'done');

                        // Step 3: AI Analysis
                        setStep(3, 'active');
                        setStatus('Analisando com Gemini AI...', 'working');
                        const viralMoment = await app.getViralMoment();
                        setStep(3, 'done');

                        // Step 4: Done
                        setStep(4, 'done');
                        setStatus('Clip viral gerado com sucesso!', 'done');

                        const viralMomentURL = `https://res.cloudinary.com/${config.cloudName}/video/upload/${viralMoment}/${app.public_id}.mp4`;
                        el.video.setAttribute('src', viralMomentURL);
                        el.video.classList.remove('hidden');
                        el.placeholder.classList.add('hidden');

                        // Animate video in
                        gsap.fromTo(el.video, { opacity: 0, scale: 0.96 }, { opacity: 1, scale: 1, duration: 0.6, ease: 'power3.out' });

                    } catch (error) {
                        console.log({ error });
                        setStatus('Erro no processamento. Tente novamente.', 'error');
                    }
                }
            }
        );

        el.button.addEventListener("click", function () {
            if (!el.apiKey.value) {
                alert('Por favor, insira sua chave de API do Gemini para continuar.');
                el.apiKey.focus();
                return;
            }

            // Reset steps
            [1, 2, 3, 4].forEach(n => setStep(n, ''));
            setStep(1, 'active');
            setStatus('Abrindo upload...', 'working');

            myWidget.open();
        }, false);

        // ─── GSAP Entrance Animations ─────────────────
        const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

        tl.to('#nav-logo', { opacity: 1, y: 0, duration: 0.6 }, 0.1)
          .to('#nav-badge', { opacity: 1, y: 0, duration: 0.6 }, 0.2)
          .to('#hero-header', { opacity: 1, y: 0, duration: 0.8 }, 0.3)
          .to('#action-row', { opacity: 1, y: 0, duration: 0.7 }, 0.5)
          .to('#steps-tracker', { opacity: 1, y: 0, duration: 0.7 }, 0.65)
          .to('#video-section', { opacity: 1, y: 0, duration: 0.7 }, 0.8)
          .to('#status-wrapper', { opacity: 1, duration: 0.5 }, 0.9)
          .to('#footer', { opacity: 1, duration: 0.5 }, 1.0);

        // Set initial states for animation
        gsap.set(['#nav-logo', '#nav-badge', '#hero-header', '#action-row', '#steps-tracker', '#video-section'], {
            y: 20
        });

    </script>
</body>

</html>
